# OpenTelemetry Collector — Eimdall configuration
# ================================================
# This file configures the Collector to:
#   - Scrape Eimdall Central's Prometheus endpoint (mTLS + bearer token)
#   - Receive traces pushed by Eimdall Central via authenticated OTLP gRPC/HTTP
#   - Re-export to any compatible backend (Grafana Tempo, Jaeger, Datadog, …)
#
# Usage:
#   export OTEL_INGEST_TOKEN=$(openssl rand -hex 32)   # same value as EIMDALL_OTEL_TOKEN in Central
#   docker run --rm \
#              -v $(pwd)/otel-collector-config.yaml:/etc/otelcol/config.yaml \
#              -v /etc/eimdall/certs:/etc/otelcol/certs \
#              -v /etc/eimdall/eimdall-token:/etc/otelcol/eimdall-token \
#              -e OTEL_INGEST_TOKEN \
#              -p 4317:4317 -p 4318:4318 \
#              otel/opentelemetry-collector-contrib:latest

extensions:
  # Bearer token authentication for incoming OTLP connections (traces pushed by Eimdall Central).
  # Central must send the same token via EIMDALL_OTEL_TOKEN.
  bearertokenauth:
    token: "${OTEL_INGEST_TOKEN}"

receivers:
  # ── Prometheus scrape of the Eimdall Central metrics endpoint (port 9091, mTLS + bearer token) ──
  prometheus:
    config:
      scrape_configs:
        - job_name: eimdall
          scrape_interval: 30s
          scheme: https
          tls_config:
            # CA that signed the Eimdall Central server certificate
            ca_file: /etc/otelcol/certs/eimdall-ca.pem
            # Client certificate for mTLS — must be signed by EIMDALL_METRICS_CLIENT_CA
            cert_file: /etc/otelcol/certs/collector-client.pem
            key_file:  /etc/otelcol/certs/collector-client-key.pem
          authorization:
            type: Bearer
            credentials_file: /etc/otelcol/eimdall-token  # contains EIMDALL_METRICS_TOKEN
          static_configs:
            - targets: ["EIMDALL_HOST:9091"]     # ← replace with Central IP/hostname

  # ── OTLP gRPC/HTTP — receives traces pushed by Eimdall Central ──
  # The bearer token is verified by the bearertokenauth extension.
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317   # EIMDALL_OTEL_ENDPOINT must point here
        auth:
          authenticator: bearertokenauth
      http:
        endpoint: 0.0.0.0:4318
        auth:
          authenticator: bearertokenauth

processors:
  # Batch spans/metrics for 5 s before flushing (reduces backend connection overhead)
  batch:
    timeout: 5s
    send_batch_size: 256

  # Enrich every span and metric with standard resource attributes
  resource:
    attributes:
      - key: deployment.environment
        value: production
        action: insert

exporters:
  # ── Grafana Tempo (traces) ──────────────────────────────────────────────────
  otlp/tempo:
    endpoint: GRAFANA_TEMPO_HOST:4317  # ← replace with Tempo host
    tls:
      # Choose ONE of the three options depending on your Tempo installation:
      #
      #   Option A — Tempo with a public certificate (Let's Encrypt, etc.)
      #     insecure: false
      #     (no ca_file — the Collector verifies against the system CA pool)
      #
      #   Option B — Tempo with a private CA or self-signed certificate
      #     insecure: false
      #     ca_file: /etc/otelcol/certs/tempo-ca.pem
      #
      #   Option C — Local development without TLS (never use in production)
      #     insecure: true
      #
      # Default below: Option A (system CA pool).
      # If Tempo uses a self-signed certificate, uncomment ca_file (Option B).
      insecure: false
      # ca_file: /etc/otelcol/certs/tempo-ca.pem

  # ── Grafana Mimir / Prometheus remote_write (metrics) ──────────────────────
  # prometheusremotewrite:
  #   endpoint: http://MIMIR_HOST:9009/api/v1/push
  #   tls:
  #     insecure: true

  # ── Jaeger (traces) ─────────────────────────────────────────────────────────
  # otlp/jaeger:
  #   endpoint: JAEGER_HOST:4317
  #   tls:
  #     insecure: true

  # ── Datadog (traces + metrics) ──────────────────────────────────────────────
  # datadog:
  #   api:
  #     key: ${DD_API_KEY}
  #   host_metadata:
  #     enabled: true

  # ── Debug — diagnostics only, do not enable in production ───────────────────
  # To activate: uncomment the "traces/debug" pipeline in service.pipelines below.
  debug:
    verbosity: basic   # basic | normal | detailed

service:
  extensions: [bearertokenauth]

  telemetry:
    logs:
      level: info

  pipelines:
    # Metrics: Prometheus scrape → Tempo (or any other OTel backend)
    metrics:
      receivers:  [prometheus]
      processors: [batch, resource]
      exporters:  [otlp/tempo]

    # Traces: OTLP push from Eimdall Central → Tempo
    traces:
      receivers:  [otlp]
      processors: [batch, resource]
      exporters:  [otlp/tempo]

    # Diagnostic pipeline — enable temporarily to inspect raw data
    # traces/debug:
    #   receivers:  [otlp]
    #   processors: [batch]
    #   exporters:  [debug]
